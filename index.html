<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joel Bonini — Portfolio</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>

<body class="shell">

  <!-- ══════════════════════════════════════
       HEADER — title bar + tab bar
       ══════════════════════════════════════ -->
  <header class="shell__header">

    <!-- Window chrome: traffic lights + filename + mobile toggle -->
    <div class="titlebar" role="presentation">

      <div class="titlebar__controls" aria-hidden="true">
        <span class="dot dot--close"></span>
        <span class="dot dot--minimize"></span>
        <span class="dot dot--maximize"></span>
      </div>

      <span class="titlebar__filename">index.html — Portfolio</span>

      <button
        class="sidebar-toggle"
        id="sidebar-toggle"
        type="button"
        aria-label="Toggle file explorer"
        aria-expanded="false"
        aria-controls="sidebar"
      >
        <!-- Hamburger icon -->
        <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true" fill="none">
          <rect x="2" y="3.5"  width="14" height="1.5" rx="0.5" fill="currentColor"/>
          <rect x="2" y="8.25" width="14" height="1.5" rx="0.5" fill="currentColor"/>
          <rect x="2" y="13"   width="14" height="1.5" rx="0.5" fill="currentColor"/>
        </svg>
      </button>
    </div>

    <!-- Open-file tabs -->
    <nav class="tabbar" aria-label="Open files">
      <a href="index.html" class="tab tab--active" aria-current="page">
        <span class="tab__icon" aria-hidden="true">◆</span>
        index.html
      </a>
      <a href="projekte.html" class="tab">
        <span class="tab__icon" aria-hidden="true">◇</span>
        projekte.html
      </a>
      <a href="kontakt.html" class="tab">
        <span class="tab__icon" aria-hidden="true">◇</span>
        kontakt.html
      </a>
    </nav>

  </header>


  <!-- ══════════════════════════════════════
       SIDEBAR — file explorer / primary nav
       ══════════════════════════════════════ -->
  <aside class="shell__sidebar" id="sidebar" aria-label="File explorer">

    <div class="explorer">

      <p class="explorer__label" aria-hidden="true">EXPLORER</p>

      <details class="explorer__folder" open>
        <summary class="explorer__folder-name">
          <span class="explorer__folder-arrow" aria-hidden="true">▾</span>
          PORTFOLIO
        </summary>

        <nav class="explorer__nav" aria-label="Site navigation">
          <a href="index.html" class="explorer__link explorer__link--active" aria-current="page">
            <span class="explorer__icon" aria-hidden="true">◆</span>
            index.html
          </a>
          <a href="projekte.html" class="explorer__link">
            <span class="explorer__icon" aria-hidden="true">◇</span>
            projekte.html
          </a>
          <a href="kontakt.html" class="explorer__link">
            <span class="explorer__icon" aria-hidden="true">◇</span>
            kontakt.html
          </a>
        </nav>

      </details>
    </div>

  </aside>


  <!-- ══════════════════════════════════════
       MAIN — editor / content area
       ══════════════════════════════════════ -->
  <main class="shell__main" id="main-content">

    <div class="welcome">

      <h1 class="welcome__heading">
        <span class="welcome__comment" aria-hidden="true">// </span>welcome
      </h1>

      <p class="welcome__intro">
        Full-stack developer crafting thoughtful digital experiences.
      </p>

      <div class="welcome__actions">
        <a href="projekte.html" class="btn btn--primary">
          <span aria-hidden="true">▶</span>
          View Projects
        </a>
        <a href="kontakt.html" class="btn btn--secondary">
          <span aria-hidden="true">✉</span>
          Get in Touch
        </a>
        <a href="assets/cv.pdf" class="btn btn--ghost">
          <span aria-hidden="true">↓</span>
          Download CV
        </a>
      </div>

    </div>

  </main>


  <!-- Mobile overlay backdrop (positioned via CSS only at <640 px) -->
  <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>


  <!-- ══════════════════════════════════════
       FOOTER — status bar
       ══════════════════════════════════════ -->
  <footer class="shell__footer">

    <div class="statusbar" role="status" aria-label="Editor status">

      <div class="statusbar__left">
        <span class="statusbar__item statusbar__item--branch">
          <!-- Branch icon (Lualine-style) -->
          <svg width="11" height="11" viewBox="0 0 11 11" aria-hidden="true" fill="currentColor">
            <circle cx="2.5" cy="2.5" r="1.5"/>
            <circle cx="2.5" cy="8.5" r="1.5"/>
            <circle cx="8.5" cy="4.5" r="1.5"/>
            <line x1="2.5" y1="4" x2="2.5" y2="7" stroke="currentColor" stroke-width="1"/>
            <line x1="4"   y1="2.5" x2="7"   y2="4" stroke="currentColor" stroke-width="1"/>
          </svg>
          main
        </span>
      </div>

      <div class="statusbar__right">
        <span class="statusbar__item statusbar__item--encoding">UTF-8</span>
        <span class="statusbar__item statusbar__item--filetype">HTML</span>
        <span class="statusbar__item statusbar__item--position">Ln 1, Col 1</span>
      </div>

    </div>

  </footer>


  <script src="js/ui.js"></script>
</body>
</html>
