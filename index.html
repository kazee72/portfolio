<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kazee72 — portfolio</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/terminal.css">
</head>

<!--
  ARCHITECTURE NOTE
  The terminal is a navigation skin over real, semantic pages.
  Each page (index / projekte / kontakt) is standalone HTML with
  correct header/main/footer; commands route between them.
  This page itself is always coherent without JS.
-->

<body class="term-shell" data-base="." data-parent="" data-page="home">

  <!-- Site title for screen readers — visually hidden -->
  <h1 class="visually-hidden">Joel Bonini — Portfolio Terminal</h1>

  <!-- ══════════════════════════════════════
       WINDOW TITLE BAR
       ══════════════════════════════════════ -->
  <header class="win-bar" role="banner">
    <span class="win-bar__title" aria-hidden="true">joel@portfolio: ~</span>
  </header>


  <!-- ══════════════════════════════════════
       MAIN — terminal output + prompt + chips
       ══════════════════════════════════════ -->
  <main class="term-body" id="term-body" aria-label="Terminal">

    <!--
      Output region: role="log" implies aria-live="polite" and
      aria-relevant="additions text" — screen readers announce
      new lines as they are appended by JS.
    -->
    <div
      class="term-output"
      id="term-output"
      role="log"
      aria-live="polite"
      aria-label="Terminal output"
    ></div>

    <!-- Live prompt line -->
    <div class="term-prompt-line">
      <span class="term-prompt-sign" aria-hidden="true">❯</span>
      <label for="term-input" class="visually-hidden">Enter a command</label>
      <input
        class="term-input"
        id="term-input"
        type="text"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        aria-label="Command input"
        enterkeyhint="send"
      >
    </div>

    <!--
      Command chips — tappable shortcuts that run the same commands
      as typing them. Primary nav fallback for mobile / non-typist users.
      Chips are real <button>s; aria-label is provided for screen readers
      who would otherwise only hear the short label text.
    -->
    <nav class="term-chips" aria-label="Quick commands">
      <button
        class="chip" type="button"
        data-cmd="about"
        aria-label="Run: about"
      >about</button>
      <button
        class="chip" type="button"
        data-cmd="cd projects"
        aria-label="Run: cd projects"
      >cd projects</button>
      <button
        class="chip" type="button"
        data-cmd="contact"
        aria-label="Run: contact"
      >contact</button>
      <button
        class="chip" type="button"
        data-cmd="help"
        aria-label="Run: help"
      >help</button>
    </nav>

  </main>


  <!-- ══════════════════════════════════════
       SITE FOOTER
       ══════════════════════════════════════ -->
  <footer class="site-footer" role="contentinfo">
    <a href="https://github.com/kazee72" class="site-footer__link"
       target="_blank" rel="noopener noreferrer">github.com/kazee72</a>
    <span class="site-footer__sep" aria-hidden="true">·</span>
    <a href="kontakt.html" class="site-footer__link">contact</a>
    <span class="site-footer__sep" aria-hidden="true">·</span>
    <span>built with vanilla html/css</span>
  </footer>


  <script src="js/terminal.js"></script>
</body>
</html>
